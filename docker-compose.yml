version: '3.9'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: playto
      POSTGRES_USER: playto
      POSTGRES_PASSWORD: playto
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U playto"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_data &&
             gunicorn playto.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120"
    environment:
      DATABASE_URL: postgresql://playto:playto@db:5432/playto
      REDIS_URL: redis://redis:6379/0
      DJANGO_SECRET_KEY: change-me-in-production-use-a-long-random-string
      DEBUG: "False"
      ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0,backend
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

  worker:
    build: ./backend
    command: celery -A playto worker --loglevel=info --concurrency=4
    environment:
      DATABASE_URL: postgresql://playto:playto@db:5432/playto
      REDIS_URL: redis://redis:6379/0
      DJANGO_SECRET_KEY: change-me-in-production-use-a-long-random-string
      DEBUG: "False"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

  beat:
    build: ./backend
    command: celery -A playto beat --loglevel=info --scheduler celery.beat:PersistentScheduler
    environment:
      DATABASE_URL: postgresql://playto:playto@db:5432/playto
      REDIS_URL: redis://redis:6379/0
      DJANGO_SECRET_KEY: change-me-in-production-use-a-long-random-string
      DEBUG: "False"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    environment:
      REACT_APP_API_URL: http://localhost:8000/api/v1
      CHOKIDAR_USEPOLLING: "true"
      WDS_SOCKET_PORT: 0
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
