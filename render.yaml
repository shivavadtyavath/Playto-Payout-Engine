services:
  # ── Django API (web service — free tier) ──────────────────────────
  - type: web
    name: playto-backend
    plan: free
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput || true
    startCommand: python manage.py migrate && (python manage.py seed_data || true) && gunicorn playto.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: playto-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://playto-payout-engine.vercel.app,http://localhost:3000"
      # No REDIS_URL — Celery runs eagerly (synchronously) on free tier
      # This means payouts process immediately in the request cycle

databases:
  # ── PostgreSQL (free tier) ────────────────────────────────────────
  - name: playto-db
    plan: free
    databaseName: playto
    user: playto
