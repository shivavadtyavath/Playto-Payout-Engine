app = "playto-backend"
primary_region = "sin"  # Singapore — closest to India

[build]
  builder = "paketobuildpacks/builder:base"

[env]
  PORT = "8080"
  DEBUG = "False"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
